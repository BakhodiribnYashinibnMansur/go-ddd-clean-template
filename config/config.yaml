app:
  name: "Go Clean Template"
  version: "1.0.0"

http:
  port: 8080
  use_prefork_mode: false
  shutdown_timeout: 5

log:
  level: "debug"

metrics:
  enabled: true

swagger:
  enabled: true

proto:
  enabled: true

admin:
  enabled: true

database:
  postgres:
    enabled: true
    pool_max: 10
  mysql:
    enabled: false
    pool_max: 10
  mongodb:
    enabled: false
    pool_max: 10
  redis:
    enabled: false
    pool_max: 10
  cassandra:
    enabled: false
    pool_max: 10
  elasticsearch:
    enabled: false
    pool_max: 10
  clickhouse:
    enabled: false
    pool_max: 10
  sqllite:
    enabled: false

jwt:
  access_ttl: "15m"
  refresh_ttl: "720h"
  issuer: "gct-auth"

limiter:
  enabled: true
  limit: 100
  period: "M"

api_keys:
  sign_expire_time: 10

cors:
  allowed_origins:
    - "*"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
    - "PATCH"
    - "HEAD"
  allowed_headers:
    - "Origin"
    - "Content-Type"
    - "Accept"
    - "Authorization"
    - "X-Requested-With"
    - "X-CSRF-Token"
    - "Accept-Language"
    - "Content-Length"
    - "Accept-Encoding"
    - "Access-Control-Request-Method"
    - "Access-Control-Request-Headers"
    - "Language"
    - "Cache-Control"
  exposed_headers: []
  allow_credentials: true
  max_age: 3600

cookie:
  domain: "localhost"
  path: "/"
  http_only: true
  max_age: 3600
  secure: false

middleware:
  request_id: true
  security: true
  metadata: true
  logger: true
  recovery: true
  persist_5xx: true
  mock: true
  rate_limiter: true
  audit_history: true
  audit_change: true
  metrics: true
  health_check: true
  signature: true

security:
  fetch_metadata_enabled: true
  csp:
    enabled: true
    directives:
      - "default-src 'self'"
      - "script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://unpkg.com https://cdn.jsdelivr.net"
      - "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://unpkg.com https://cdn.jsdelivr.net https://boxicons.com"
      - "font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com https://unpkg.com https://boxicons.com data:"
      - "img-src 'self' data: https:"
      - "connect-src 'self'"
      - "frame-ancestors 'none'"
      - "base-uri 'self'"
      - "form-action 'self'"

# Brokers
broker:
  kafka:
    enabled: false
  nats:
    enabled: false
  rabbitmq:
    enabled: false

# Asynq
asynq:
  enabled: false

# MinIO Object Storage
minio:
  enabled: true

# Redis Cache
redis:
  enabled: false

# Telegram Bot
telegram:
  enabled: false

# Distributed Tracing
tracing:
  enabled: true

# SQLC Code Generation
sqlc:
  enabled: false

