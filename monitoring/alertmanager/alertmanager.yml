# ─────────────────────────────────────────────────────────────────────────────
# Alertmanager Configuration — GCA Backend
# ─────────────────────────────────────────────────────────────────────────────

global:
  resolve_timeout: 5m

route:
  receiver: "default"
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: "critical"
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: "default"
    webhook_configs:
      - url: "http://gca:8080/api/v1/webhooks/alertmanager"
        send_resolved: true

  - name: "critical"
    webhook_configs:
      - url: "http://gca:8080/api/v1/webhooks/alertmanager"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]
