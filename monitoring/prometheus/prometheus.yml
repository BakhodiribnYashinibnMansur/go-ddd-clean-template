global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "gca"
    metrics_path: /metrics
    static_configs:
      - targets: ["gca:8080"]
        labels:
          service: "gca-backend"

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
