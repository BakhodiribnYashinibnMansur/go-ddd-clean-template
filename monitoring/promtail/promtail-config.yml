# ─────────────────────────────────────────────────────────────────────────────
# Promtail Configuration — Docker container log collection
# ─────────────────────────────────────────────────────────────────────────────

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: network
            values: ["backend_app_network"]

    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container_name"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "logstream"
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"

    pipeline_stages:
      # Docker JSON log format
      - docker: {}

      # Parse Zap JSON output from GCA backend
      - match:
          selector: '{container_name="gca"}'
          stages:
            - json:
                expressions:
                  level: level
                  msg: msg
                  caller: caller
                  operation: operation
                  trace_id: trace_id
                  request_id: request_id
            - labels:
                level:
                operation:
            - timestamp:
                source: ts
                format: Unix
