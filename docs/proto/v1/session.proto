syntax = "proto3";

package grpc.v1;

option go_package = "docs/proto/v1";

import "pagination.proto";

// ============================================================================
// MESSAGE DEFINITIONS
// ============================================================================

// SessionDeviceType represents the type of device
enum SessionDeviceType {
  DEVICE_TYPE_UNSPECIFIED = 0;
  DEVICE_TYPE_DESKTOP = 1;
  DEVICE_TYPE_MOBILE = 2;
  DEVICE_TYPE_TABLET = 3;
  DEVICE_TYPE_BOT = 4;
  DEVICE_TYPE_TV = 5;
}

// Session represents a user session
message Session {
  string id = 1;
  string device_id = 2;
  optional string device_name = 3;
  SessionDeviceType device_type = 4;
  optional string ip_address = 5;
  optional string user_agent = 6;
  optional string fcm_token = 7;
  int64 user_id = 8;
  int64 company_id = 9;
  string refresh_token_hash = 10; // Only used in internal communication
  int64 expires_at = 11;
  int64 last_activity = 12;
  bool revoked = 13;
  int64 created_at = 14;
  int64 updated_at = 15;
}

// SessionFilter represents a filter for session queries
message SessionFilter {
  optional string id = 1;
  optional int64 user_id = 2;
  optional bool revoked = 3;
}

// SessionsFilter represents a filter for multiple sessions with pagination
message SessionsFilter {
  SessionFilter session_filter = 1;
  Pagination pagination = 2;
}

// Pagination represents pagination parameters
message Pagination {
  int64 limit = 1;
  int64 offset = 2;
}

// SessionCreateRequest represents a request to create a session
message SessionCreateRequest {
  string device_id = 1;
  optional string device_name = 2;
  SessionDeviceType device_type = 3;
  optional string ip_address = 4;
  optional string user_agent = 5;
  optional string fcm_token = 6;
  int64 user_id = 7;
  int64 company_id = 8;
  int64 expires_at = 9;
}

// SessionUpdateRequest represents a request to update a session
message SessionUpdateRequest {
  string id = 1;
  optional string device_name = 2;
  optional SessionDeviceType device_type = 3;
  optional string ip_address = 4;
  optional string user_agent = 5;
  optional string fcm_token = 6;
  optional int64 expires_at = 7;
  optional int64 last_activity = 8;
}

// SessionResponse represents a session response
message SessionResponse {
  Session session = 1;
}

// SessionsResponse represents multiple sessions response
message SessionsResponse {
  repeated Session sessions = 1;
  Pagination pagination = 2;
}

// SessionRevokeRequest represents a request to revoke sessions
message SessionRevokeRequest {
  optional string session_id = 1;
  optional int64 user_id = 2;
  bool revoke_all = 3;
}

// SessionRevokeResponse represents revoke session response
message SessionRevokeResponse {
  bool success = 1;
  string message = 2;
  int64 revoked_count = 3;
}

// ============================================================================
// SERVICE DEFINITIONS
// ============================================================================

// The Session service definition.
service SessionService {
  // RPC method to create a new session.
  rpc CreateSession (SessionCreateRequest) returns (SessionResponse);
  
  // RPC method to get session by ID.
  rpc GetSession (SessionFilter) returns (SessionResponse);
  
  // RPC method to get sessions with pagination and filtering.
  rpc GetSessions (SessionsFilter) returns (SessionsResponse);
  
  // RPC method to update session information.
  rpc UpdateSession (SessionUpdateRequest) returns (SessionResponse);
  
  // RPC method to delete session.
  rpc DeleteSession (SessionFilter) returns (SessionResponse);
  
  // RPC method to revoke session(s).
  rpc RevokeSession (SessionRevokeRequest) returns (SessionRevokeResponse);
  
  // RPC method to update session activity.
  rpc UpdateActivity (SessionFilter) returns (SessionResponse);
}
