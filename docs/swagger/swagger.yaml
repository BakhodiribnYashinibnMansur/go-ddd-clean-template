            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get audit logs
      tags:
      - audit
  /audit/sessions:
    get:
      description: Retrieve session-related audit logs (create, revoke, refresh)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get session audit logs
      tags:
      - audit
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Rotates access and refresh tokens using a valid refresh token.
      parameters:
      - description: Refresh request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/gct_internal_domain.RefreshIn'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Refresh tokens
      tags:
      - auth
  /auth/sign-in:
    post:
      consumes:
      - application/json
      description: Authenticate user with credentials and return access/refresh tokens
      parameters:
      - description: User credentials (phone/email/username and password)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/gct_internal_domain.SignInIn'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.SuccessResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
      summary: Sign In
      tags:
