      security:
      - BearerAuth: []
      summary: Sign Out
      tags:
      - auth
  /auth/sign-up:
    post:
      consumes:
      - application/json
      description: Register a new user
      parameters:
      - description: User info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/gct_internal_domain.SignUpIn'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.SuccessResponse'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
      summary: Sign Up
      tags:
      - auth
  /authz/permissions:
    get:
      consumes:
      - application/json
      description: Get list of permissions with pagination and optional filtering
      parameters:
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      - description: Filter by name
        in: query
        name: name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
