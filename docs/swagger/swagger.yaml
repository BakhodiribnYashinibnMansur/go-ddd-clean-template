  /auth/sign-out:
    post:
      consumes:
      - application/json
      description: Revoke current session
      parameters:
      - description: Sign out request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/gct_internal_domain.SignOutIn'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.SuccessResponse'
        "400":
          description: Bad Request
