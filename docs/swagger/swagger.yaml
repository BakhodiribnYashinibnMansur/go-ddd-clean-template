basePath: /api/v1
definitions:
  domain.AuditActionType:
    enum:
    - LOGIN
    - LOGOUT
    - SESSION_REVOKE
    - PASSWORD_CHANGE
    - MFA_VERIFY_FAIL
    - ACCESS_GRANTED
    - ACCESS_DENIED
    - POLICY_MATCHED
    - POLICY_DENIED
    - USER_CREATE
    - USER_UPDATE
    - USER_DELETE
    - ROLE_ASSIGN
    - ROLE_REMOVE
    - ORDER_APPROVE
    - ORDER_CANCEL
    - PAYMENT_PROCESS
    - PAYMENT_CANCEL
    - POLICY_EVALUATED
    - ADMIN_CHANGE
    type: string
    x-enum-varnames:
    - AuditActionLogin
    - AuditActionLogout
    - AuditActionSessionRevoke
    - AuditActionPasswordChange
    - AuditActionMfaVerifyFail
    - AuditActionAccessGranted
    - AuditActionAccessDenied
    - AuditActionPolicyMatched
    - AuditActionPolicyDenied
    - AuditActionUserCreate
    - AuditActionUserUpdate
    - AuditActionUserDelete
    - AuditActionRoleAssign
    - AuditActionRoleRemove
    - AuditActionOrderApprove
    - AuditActionOrderCancel
    - AuditActionPaymentProcess
    - AuditActionPaymentCancel
    - AuditActionPolicyEvaluated
    - AuditActionAdminChange
  domain.AuditLog:
    properties:
      action:
        $ref: '#/definitions/domain.AuditActionType'
      created_at:
        type: string
      decision:
        type: string
      error_message:
        type: string
      id:
        type: string
      ip_address:
        type: string
      metadata:
        additionalProperties: {}
        type: object
      permission:
        type: string
      platform:
        type: string
      policy_id:
        type: string
      resource_id:
        type: string
      resource_type:
        type: string
      session_id:
        type: string
      success:
        type: boolean
      user_agent:
        type: string
      user_id:
        type: string
    type: object
  domain.EndpointHistory:
    properties:
      created_at:
        type: string
      decision:
        type: string
      duration_ms:
        type: integer
      error_message:
        type: string
      id:
        type: string
      ip_address:
        type: string
      method:
        type: string
      path:
        type: string
      permission:
        type: string
      platform:
        type: string
      rate_limited:
        type: boolean
      request_id:
        type: string
      response_size:
        type: integer
      session_id:
        type: string
      status_code:
        type: integer
      user_agent:
        type: string
      user_id:
        type: string
    type: object
  domain.ErrorCategory:
    enum:
    - DATA
    - AUTH
    - SYSTEM
    - VALIDATION
    - BUSINESS
    - UNKNOWN
    type: string
    x-enum-varnames:
    - CategoryData
    - CategoryAuth
    - CategorySystem
    - CategoryValidation
    - CategoryBusiness
    - CategoryUnknown
  domain.ErrorCode:
    properties:
      category:
        $ref: '#/definitions/domain.ErrorCategory'
      code:
        type: string
      created_at:
        type: string
      http_status:
        type: integer
      id:
        type: string
      message:
        type: string
      retry_after:
        type: integer
      retryable:
        type: boolean
      severity:
        $ref: '#/definitions/domain.ErrorSeverity'
      suggestion:
        type: string
      updated_at:
        type: string
    type: object
  domain.ErrorSeverity:
    enum:
    - LOW
    - MEDIUM
    - HIGH
    - CRITICAL
    type: string
    x-enum-varnames:
    - SeverityLow
    - SeverityMedium
    - SeverityHigh
    - SeverityCritical
  domain.FunctionMetric:
    properties:
      created_at:
        type: string
      id:
        type: string
      is_panic:
        type: boolean
      latency_ms:
        type: integer
      name:
        type: string
      panic_error:
        type: string
    type: object
  domain.Permission:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      parent_id:
        type: string
    type: object
  domain.RefreshIn:
    properties:
      session_id:
        type: string
    required:
    - session_id
    type: object
  domain.RevokeSessionsIn:
    properties:
      user_id:
        type: string
    type: object
  domain.Role:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  domain.Scope:
    properties:
      created_at:
        type: string
      method:
        type: string
      path:
        type: string
    type: object
  domain.Session:
    properties:
      browser:
        type: string
      browser_version:
        type: string
      created_at:
        type: string
      data:
        items:
          type: integer
        type: array
      device_id:
        type: string
      device_name:
        type: string
      device_type:
        $ref: '#/definitions/domain.SessionDeviceType'
      expires_at:
        type: string
      fcm_token:
        type: string
      id:
        type: string
      ip_address:
        type: string
      last_activity:
        type: string
      os:
        type: string
      os_version:
        type: string
      refresh_token_hash:
        type: string
      revoked:
        type: boolean
      updated_at:
        type: string
      user_agent:
        type: string
      user_id:
        type: string
    type: object
  domain.SessionDeviceType:
    enum:
    - DESKTOP
    - MOBILE
    - TABLET
    - BOT
    - TV
    type: string
    x-enum-varnames:
    - DeviceTypeDesktop
    - DeviceTypeMobile
    - DeviceTypeTablet
    - DeviceTypeBot
    - DeviceTypeTV
  domain.SignOutIn:
    properties:
      session_id:
        type: string
      user_id:
        type: string
    required:
    - session_id
    type: object
  domain.User:
    properties:
      active:
        type: boolean
      attributes:
        additionalProperties: {}
        description: JSONB for ABAC (region, branch, dept)
        type: object
      created_at:
        type: string
      deleted_at:
        type: integer
      email:
        type: string
      id:
        type: string
      is_approved:
        type: boolean
      last_seen:
        type: string
      password:
        description: Transient field for input
        type: string
      phone:
        type: string
      role_id:
        type: string
      updated_at:
        type: string
      username:
        minLength: 3
        type: string
    required:
    - phone
    type: object
  errorcode.CreateErrorCodeInput:
    properties:
      category:
        $ref: '#/definitions/domain.ErrorCategory'
      code:
        type: string
      http_status:
        type: integer
      message:
        type: string
      retry_after:
        type: integer
      retryable:
        type: boolean
      severity:
        $ref: '#/definitions/domain.ErrorSeverity'
      suggestion:
        type: string
    required:
    - code
    - http_status
    - message
    type: object
  errorcode.UpdateErrorCodeInput:
    properties:
      category:
        $ref: '#/definitions/domain.ErrorCategory'
      http_status:
        type: integer
      message:
        type: string
      retry_after:
        type: integer
      retryable:
        type: boolean
      severity:
        $ref: '#/definitions/domain.ErrorSeverity'
      suggestion:
        type: string
    type: object
  gct_internal_controller_restapi_response.ErrorDetail:
    properties:
      category:
        example: DATA
        type: string
      code:
        example: RESOURCE_NOT_FOUND
        type: string
      details:
        example: The user with the ID '12345' does not exist in our records.
        type: string
      message:
        example: The requested resource was not found.
        type: string
      method:
        example: GET
        type: string
      path:
        example: /api/v1/users/12345
        type: string
      retry_after:
        description: seconds
        example: 5
        type: integer
      retryable:
        example: false
        type: boolean
      severity:
        description: Enhanced fields
        example: MEDIUM
        type: string
      suggestion:
        example: Please check our documentation.
        type: string
      timestamp:
        example: "2023-12-08T12:30:45Z"
        type: string
    type: object
  gct_internal_controller_restapi_response.ErrorResponse:
    properties:
      documentation_url:
        example: https://developer.mozilla.org/en-US/docs/Web/HTTP/Status
        type: string
      error:
        $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorDetail'
      requestId:
        example: a1b2c3d4-e5f6-7890-g1h2-i3j4k5l6m7n8
        type: string
      status:
        example: error
        type: string
      statusCode:
        example: 404
        type: integer
    type: object
  gct_internal_controller_restapi_response.SuccessResponse:
    properties:
      data: {}
      message:
        example: Operation completed successfully
        type: string
      meta: {}
      status:
        description: '"success" or "error"'
        example: success
        type: string
      statusCode:
        example: 200
        type: integer
    type: object
  restapi_v1_asynq.EmailRequest:
    properties:
      body:
        type: string
      data:
        additionalProperties:
          type: string
        type: object
      subject:
        type: string
      to:
        type: string
    required:
    - body
    - subject
    - to
    type: object
  restapi_v1_asynq.NotificationRequest:
    properties:
      data:
        additionalProperties:
          type: string
        type: object
      message:
        type: string
      title:
        type: string
      user_id:
        type: string
    required:
    - message
    - title
    - user_id
    type: object
  restapi_v1_asynq.SeedRequest:
    properties:
      clear_data:
        type: boolean
      permissions_count:
        type: integer
      roles_count:
        type: integer
      seed:
        type: integer
      users_count:
        type: integer
    type: object
  restapi_v1_authz_permission.ScopeRequest:
    properties:
      method:
        type: string
      path:
        type: string
    required:
    - method
    - path
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: A modular and scalable Go REST API template implementing Clean Architecture.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Go Clean Template API
  version: "1.0"
paths:
  /api/v1/asynq/email/test:
    post:
      consumes:
      - application/json
      description: Enqueue a test email task into the queue system
      parameters:
      - description: 'Email details: recipient, subject, and body'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/restapi_v1_asynq.EmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Returns task ID and queue name on success
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Malformed request body or invalid email format
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Failed to connect to the task queue
          schema:
            additionalProperties: true
            type: object
      summary: Send test email
      tags:
      - asynq
  /api/v1/asynq/notification/test:
    post:
      consumes:
      - application/json
      description: Enqueue a push notification task for a specific user
      parameters:
      - description: 'Notification details: userID, title, and message'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/restapi_v1_asynq.NotificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Send test notification
      tags:
      - asynq
  /api/v1/asynq/seed:
    post:
      consumes:
      - application/json
      description: Enqueue a task to populate the database with mock data for testing
      parameters:
      - description: 'Seeding parameters: counts for users, roles, etc.'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/restapi_v1_asynq.SeedRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Seed database
      tags:
      - asynq
  /api/v1/featureflag/boolean:
    get:
      consumes:
      - application/json
      description: Demonstrates how to use a boolean feature flag to toggle UI elements
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Example Boolean Flag
      tags:
      - feature-flags
  /api/v1/featureflag/int:
    get:
      consumes:
      - application/json
      description: Demonstrates integer flags for dynamic numeric tuning (e.g. rate
        limits)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Example Int Variation
      tags:
      - feature-flags
  /api/v1/featureflag/json:
    get:
      consumes:
      - application/json
      description: Demonstrates JSON flags for shipping complex structured configurations
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Example JSON Variation
      tags:
      - feature-flags
  /api/v1/featureflag/rollout:
    get:
      consumes:
      - application/json
      description: Demonstrates gradual percentage-based rollouts to minimize risk
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Example Percentage Rollout
      tags:
      - feature-flags
  /api/v1/featureflag/string:
    get:
      consumes:
      - application/json
      description: Demonstrates string-based flags for multi-variant A/B testing
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Example String Variation
      tags:
      - feature-flags
  /api/v1/featureflag/targeting:
    get:
      consumes:
      - application/json
      description: Demonstrates segment-based flag targeting (e.g. per plan or email)
      parameters:
      - description: Unique identity for targeting
        in: query
        name: user_id
        type: string
      - description: Email address for precise targeting
        in: query
        name: email
        type: string
      - description: Segment identifier (free/premium)
        in: query
        name: plan
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Example User Targeting
      tags:
      - feature-flags
  /audit/actions:
    get:
      description: Retrieve critical business and admin action logs
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.SuccessResponse'
      summary: Get business action audit logs
      tags:
      - audit
  /audit/history:
    get:
      consumes:
      - application/json
      description: Retrieve endpoint histories with filtering and pagination
      parameters:
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      - description: User ID
        in: query
        name: user_id
        type: string
      - description: Method
        in: query
        name: method
        type: string
      - description: Path
        in: query
        name: path
        type: string
      - description: Status Code
        in: query
        name: status_code
        type: integer
      - description: From Date (RFC3339)
        in: query
        name: from_date
        type: string
      - description: To Date (RFC3339)
        in: query
        name: to_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/gct_internal_controller_restapi_response.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/domain.EndpointHistory'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
      summary: Get endpoint histories
      tags:
      - audit
  /audit/logins:
    get:
      description: Retrieve login-related audit logs (success, fail, reason)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.SuccessResponse'
      summary: Get login audit logs
      tags:
      - audit
  /audit/logs:
    get:
      consumes:
      - application/json
      description: Retrieve audit logs with filtering and pagination
      parameters:
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      - description: User ID
        in: query
        name: user_id
        type: string
      - description: Action
        in: query
        name: action
        type: string
      - description: Resource Type
        in: query
        name: resource_type
        type: string
      - description: Resource ID
        in: query
        name: resource_id
        type: string
      - description: Success
        in: query
        name: success
        type: boolean
      - description: From Date (RFC3339)
        in: query
        name: from_date
        type: string
      - description: To Date (RFC3339)
        in: query
        name: to_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/gct_internal_controller_restapi_response.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/domain.AuditLog'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
      summary: Get audit logs
      tags:
      - audit
  /audit/sessions:
    get:
      description: Retrieve session-related audit logs (create, revoke, refresh)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.SuccessResponse'
      summary: Get session audit logs
      tags:
      - audit
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Rotates access and refresh tokens using a valid refresh token.
      parameters:
      - description: Refresh request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.RefreshIn'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
      summary: Refresh tokens
      tags:
      - auth
  /auth/sign-in:
    post:
      consumes:
      - application/json
      description: Authenticate user and return tokens
      parameters:
      - description: Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.User'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
      summary: Sign In
      tags:
      - auth
  /auth/sign-out:
    post:
      consumes:
      - application/json
      description: Revoke current session
      parameters:
      - description: Sign out request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.SignOutIn'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
      summary: Sign Out
      tags:
      - auth
  /auth/sign-up:
    post:
      consumes:
      - application/json
      description: Register a new user
      parameters:
      - description: User info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.User'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
      summary: Sign Up
      tags:
      - auth
  /authz/permissions:
    get:
      consumes:
      - application/json
      description: Get list of permissions with pagination and optional filtering
      parameters:
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      - description: Filter by name
        in: query
        name: name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/gct_internal_controller_restapi_response.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/domain.Permission'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
      summary: List permissions
      tags:
      - authz-permissions
    post:
      consumes:
      - application/json
      description: Create a new permission
      parameters:
      - description: Permission creation body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.Permission'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gct_internal_controller_restapi_response.ErrorResponse'
      summary: Create a new permission
      tags:
