{{ define "base" }}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - Admin Panel</title>
    <!-- Google Fonts: Outfit & Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Intel One Mono (Google Fonts) -->
    <link href="https://fonts.googleapis.com/css2?family=Intel+One+Mono:ital,wght@0,300..700;1,300..700&display=swap"
        rel="stylesheet">
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />

    <!-- Boxicons (Optional if needed) -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <!-- Custom Premium Admin CSS -->
    <link rel="stylesheet" href="/static/css/layout/main.css?v=dev6">

    <!-- Page-specific styles -->
    {{ block "styles" . }}{{ end }}
</head>

<body>
    <div class="admin-layout">
        {{ template "sidebar" . }}

        <div class="main-content">
            <!-- Header removed as per request -->

            <main class="page-content">
                {{ block "content" .Data }}{{ end }}
            </main>
        </div>
    </div>



    <!-- Scripts -->
    <!-- Custom JS -->
    <script src="/static/js/admin.js"></script>
    {{ block "scripts" . }}{{ end }}
</body>

</html>
{{ end }}
