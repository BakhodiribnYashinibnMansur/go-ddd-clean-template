{{ define "base" }}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - Admin Panel</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />

    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/layout/main.css?v=v2.0">

    {{ block "styles" . }}{{ end }}
</head>

<body>
    <div class="admin-layout">
        {{ template "sidebar" . }}

        <div class="main-content">
            <main class="page-content">
                {{ block "content" .Data }}{{ end }}
            </main>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
    {{ block "scripts" . }}{{ end }}
</body>

</html>
{{ end }}
