{{ define "sessions_scripts" }}
<script>
    // Copy to clipboard functionality with visual feedback
    function copyToClipboard(text, button) {
        navigator.clipboard.writeText(text).then(() => {
            const icon = button.querySelector('i');
            const originalIcon = icon.textContent;

            // Change icon to checkmark
            icon.textContent = 'check';
            icon.style.color = 'var(--success)';

            // Reset after 2 seconds
            setTimeout(() => {
                icon.textContent = originalIcon;
                icon.style.color = '';
            }, 2000);
        }).catch(err => {
            console.error('Failed to copy:', err);
            alert('Failed to copy to clipboard');
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        const revokeBtns = document.querySelectorAll('.revoke-session-btn');
        revokeBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                // Prevent row click if we have that logic (good practice)
                e.stopPropagation();
                const id = btn.dataset.id;
                revokeSession(id);
            });
        });
    });

    async function revokeSession(sessionId) {
        if (!sessionId) return;
        if (!confirm('Are you sure you want to revoke this session? The user will be logged out.')) return;

        try {
            const response = await fetch(`/admin/sessions/${sessionId}/revoke`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });

            if (response.ok) {
                window.location.reload();
            } else {
                alert('Failed to revoke session');
            }
        } catch (err) {
            console.error(err);
            alert('An error occurred');
        }
    }
</script>
{{ end }}
