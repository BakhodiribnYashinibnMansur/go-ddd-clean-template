{{ define "sessions_scripts" }}
<script>
    // Copy to clipboard with visual feedback
    function copyToClipboard(text, button) {
        navigator.clipboard.writeText(text).then(() => {
            const icon = button.querySelector('i');
            const originalIcon = icon.textContent;
            icon.textContent = 'check';
            icon.style.color = 'var(--emerald)';
            setTimeout(() => {
                icon.textContent = originalIcon;
                icon.style.color = '';
            }, 2000);
        }).catch(err => {
            console.error('Failed to copy:', err);
        });
    }

    // Revoke session handler
    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.revoke-session-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.dataset.id;
                revokeSession(id);
            });
        });
    });

    async function revokeSession(sessionId) {
        if (!sessionId) return;

        const confirmed = await showConfirm({
            title: 'Revoke Session',
            message: 'Are you sure you want to revoke this session? The user will be logged out immediately and will need to sign in again.',
            confirmText: 'Revoke',
            type: 'danger'
        });
        if (!confirmed) return;

        try {
            const response = await fetch(`/admin/sessions/${sessionId}/revoke`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });

            if (response.ok) {
                window.location.reload();
            } else {
                const data = await response.json().catch(() => null);
                showToast(data?.error || 'Failed to revoke session', 'error');
            }
        } catch (err) {
            console.error(err);
            showToast('An error occurred while revoking the session', 'error');
        }
    }
</script>
{{ end }}
