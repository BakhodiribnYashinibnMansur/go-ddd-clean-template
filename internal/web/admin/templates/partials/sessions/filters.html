{{ define "sessions_filters" }}
<div class="card mb-4" style="margin-bottom: 32px;">
    <form method="GET" action="/admin/sessions" class="filter-bar flex-between"
        style="gap: 16px; align-items: flex-end;">
        <div style="flex: 1;">
            <label class="form-label" style="display: block; margin-bottom: 8px;">User ID (UUID)</label>
            <div style="position: relative;">
                <i class="material-symbols-outlined"
                    style="position: absolute; left: 12px; top: 12px; color: var(--text-muted); font-size: 20px;">fingerprint</i>
                <input type="text" name="user_id" class="form-control" style="padding-left: 44px; width: 100%;"
                    placeholder="Search by User ID..." value="{{ .QueryParams.Get " user_id" }}">
            </div>
        </div>
        <div style="width: 200px;">
            <label class="form-label text-body"
                style="font-size: 14px; margin-bottom: 8px; display: block;">Status</label>
            <select name="revoked" class="form-control" style="cursor: pointer;">
                <option value="">All</option>
                <option value="false" {{ if eq (.QueryParams.Get "revoked" ) "false" }}selected{{ end }}>Active</option>
                <option value="true" {{ if eq (.QueryParams.Get "revoked" ) "true" }}selected{{ end }}>Revoked</option>
            </select>
        </div>
        <div style="display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary">Filter</button>
            <a href="/admin/sessions" class="btn btn-secondary">Reset</a>
        </div>
    </form>
</div>
{{ end }}
