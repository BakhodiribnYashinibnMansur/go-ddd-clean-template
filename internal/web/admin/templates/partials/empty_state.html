{{ define "empty_state" }}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 56px 24px; text-align: center;">
    <div style="width: 64px; height: 64px; border-radius: 16px; background: rgba(99, 102, 241, 0.06); display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
        <i class="material-symbols-outlined" style="font-size: 32px; color: var(--text-muted); opacity: 0.6;">{{ .Icon }}</i>
    </div>
    <div style="font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px;">{{ .Title }}</div>
    <div style="font-size: 13px; color: var(--text-muted); max-width: 320px; line-height: 1.5;">{{ .Message }}</div>
</div>
{{ end }}
