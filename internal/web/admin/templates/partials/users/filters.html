{{ define "users_filters" }}
<div class="card mb-4" style="margin-bottom: 32px; overflow: visible;">
    <form method="GET" action="/admin/users" class="filter-bar flex-between" style="gap: 16px; align-items: flex-end;">
        <div style="flex: 1;">
            <label class="form-label text-body" style="font-size: 14px; margin-bottom: 8px; display: block;">Search
                Email</label>
            <div style="position: relative;">
                <i class="material-symbols-outlined"
                    style="position: absolute; left: 12px; top: 12px; font-size: 20px; color: var(--text-muted);">search</i>
                <input type="text" name="email" class="form-control" style="padding-left: 44px; width: 100%;"
                    placeholder="user@example.com" value="{{ .Filter.Email | default "" }}">
            </div>
        </div>
        <div style="width: 200px;">
            <label class="form-label text-body"
                style="font-size: 14px; margin-bottom: 8px; display: block;">Status</label>
            <select name="active" class="form-control" style="cursor: pointer;">
                <option value="">All</option>
                <option value="true" {{ with index .QueryParams "active" }}{{ if eq (index . 0) "true" }}selected{{ end
                    }}{{ end }}>Active</option>
                <option value="false" {{ with index .QueryParams "active" }}{{ if eq (index . 0) "false" }}selected{{
                    end }}{{ end }}>Inactive</option>
            </select>
        </div>
        <div style="display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary" style="height: 44px;">Filter</button>
            <a href="/admin/users" class="btn btn-secondary" style="height: 44px;">Reset</a>
        </div>
    </form>
</div>
{{ end }}
