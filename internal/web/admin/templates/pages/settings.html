{{ define "content" }}
<div style="margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between;">
    <h2 class="text-h2">Settings</h2>
</div>

<div class="dashboard-grid">
    <!-- General Settings -->
    <div class="card">
        <h3 class="text-h3" style="margin-bottom: 16px;">General Information</h3>

        <div class="form-group">
            <label class="form-label">System Name</label>
            <input type="text" class="form-input" value="Go Clean Template" readonly>
        </div>

        <div class="form-group">
            <label class="form-label">Version</label>
            <input type="text" class="form-input" value="1.0.0" readonly>
            <div style="margin-top: 4px; font-size: 12px; color: var(--md-sys-color-primary);">Latest version installed
            </div>
        </div>
    </div>

    <!-- Interface Settings -->
    <div class="card">
        <h3 class="text-h3" style="margin-bottom: 16px;">Interface</h3>

        <div class="form-group">
            <label class="form-label">Theme</label>
            <div style="display: flex; gap: 8px; margin-top: 8px;">
                <button class="btn btn-primary">
                    <i class="material-symbols-outlined" style="font-size: 18px;">light_mode</i>
                    Light
                </button>
                <button class="btn btn-secondary">
                    <i class="material-symbols-outlined" style="font-size: 18px;">dark_mode</i>
                    Dark
                </button>
            </div>
        </div>
    </div>
</div>
{{ end }}
