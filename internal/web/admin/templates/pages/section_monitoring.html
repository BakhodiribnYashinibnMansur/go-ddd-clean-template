{{ define "content" }}
<div class="page-content-wrapper">
    <div class="content-header flex-between" style="margin-bottom: 32px;">
        <div>
            <h2 style="margin-bottom: 8px;">System Monitoring</h2>
            <p class="text-muted">Track trails, errors, and performance</p>
        </div>
    </div>

    <div style="display: flex; gap: 16px; margin-bottom: 32px;">
        <a href="/admin/audit/logs" class="btn btn-secondary" style="flex: 1; justify-content: center; height: 50px;">
            <i class="material-symbols-outlined" style="margin-right: 8px;">history</i>
            Audit Logs
        </a>
        <a href="/admin/system-errors" class="btn btn-secondary"
            style="flex: 1; justify-content: center; height: 50px;">
            <i class="material-symbols-outlined" style="margin-right: 8px;">error</i>
            System Errors
        </a>
        <a href="/admin/functions" class="btn btn-secondary" style="flex: 1; justify-content: center; height: 50px;">
            <i class="material-symbols-outlined" style="margin-right: 8px;">functions</i>
            Function Metrics
        </a>
    </div>

    <!-- Stats -->
    <div class="neon-stats-grid">
        <div class="neon-card">
            <div class="stat-value-big">{{ .AuditCount }}</div>
            <div class="text-muted">Audit Records</div>
        </div>
        <div class="neon-card">
            <div class="stat-value-big" style="color: var(--danger);">{{ .ErrorCount }}</div>
            <div class="text-muted">Recent Errors</div>
        </div>
    </div>
</div>
{{ end }}
