{{ template "base" . }}

{{ define "content" }}
<div style="margin-bottom: 24px;">
    <a href="/admin/rbac/roles" class="text-body"
        style="display: inline-flex; align-items: center; gap: 8px; margin-bottom: 8px;">
        <i class="material-symbols-outlined" style="font-size: 18px;">arrow_back</i> Back to Roles
    </a>
    <h2>{{ if .Role.ID }}Edit Role{{ else }}Create New Role{{ end }}</h2>
</div>

<form id="roleForm" class="card">
    <input type="hidden" name="id" value="{{ .Role.ID }}">

    <div class="form-group">
        <label class="form-label">Role Name</label>
        <input type="text" name="name" class="form-input" value="{{ .Role.Name }}" required placeholder="e.g. Manager">
    </div>

    <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" name="description" class="form-input" value="{{ .Role.Description }}"
            placeholder="Role responsibility description">
    </div>

    <div class="form-group">
        <label class="form-label" style="margin-bottom: 12px;">Permissions</label>
        <div
            style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; max-height: 400px; overflow-y: auto; padding: 12px; border: 1px solid var(--md-sys-color-outline-variant); border-radius: 8px;">
            {{ range .AllPermissions }}
            <label
                style="display: flex; align-items: center; gap: 12px; padding: 8px; border-radius: 4px; cursor: pointer; background: var(--md-sys-color-surface-variant);">
                <input type="checkbox" name="permissions" value="{{ .ID }}" {{ if .Assigned }}checked{{ end }}
                    style="width: 18px; height: 18px; accent-color: var(--md-sys-color-primary);">
                <div>
                    <div style="font-weight: 500; font-size: 14px;">{{ .Resource }}:{{ .Action }}</div>
                    <div style="font-size: 12px; color: var(--md-sys-color-on-surface-variant);">{{ .Description }}
                    </div>
                </div>
            </label>
            {{ end }}
        </div>
    </div>

    <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;">
        <a href="/admin/rbac/roles" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">Save Role</button>
    </div>
</form>
{{ end }}

{{ define "scripts" }}
<script src="/static/js/rbac.js"></script>
{{ end }}
