{{ define "content" }}
<div class="page-header">
    <div>
        <h1 class="page-title">Code Linter</h1>
        <p class="page-subtitle">Run golangci-lint and view code quality reports</p>
    </div>
    <button id="runLinterBtn" class="btn-primary">
        <i class="material-symbols-outlined">play_arrow</i>
        Run Linter
    </button>
</div>

<div class="linter-container">
    <!-- Status Card -->
    <div class="status-card" id="statusCard" style="display: none;">
        <div class="status-icon" id="statusIcon">
            <i class="material-symbols-outlined">pending</i>
        </div>
        <div class="status-content">
            <h3 id="statusTitle">Running Linter...</h3>
            <p id="statusMessage">Please wait while we analyze your code</p>
        </div>
    </div>

    <!-- Statistics Cards -->
    <div class="stats-grid" id="statsGrid" style="display: none;">
        <div class="stat-card">
            <div class="stat-icon" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                <i class="material-symbols-outlined">bug_report</i>
            </div>
            <div class="stat-content">
                <div class="stat-value" id="totalIssues">0</div>
                <div class="stat-label">Total Issues</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                <i class="material-symbols-outlined">category</i>
            </div>
            <div class="stat-content">
                <div class="stat-value" id="totalLinters">0</div>
                <div class="stat-label">Linters</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                <i class="material-symbols-outlined">description</i>
            </div>
            <div class="stat-content">
                <div class="stat-value" id="totalFiles">0</div>
                <div class="stat-label">Files Affected</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">
                <i class="material-symbols-outlined">schedule</i>
            </div>
            <div class="stat-content">
                <div class="stat-value" id="lastRun">Never</div>
                <div class="stat-label">Last Run</div>
            </div>
        </div>
    </div>

    <!-- Search and Filter Section -->
    <div class="search-section" id="searchSection" style="display: none;">
        <div class="search-bar">
            <i class="material-symbols-outlined">search</i>
            <input type="text" id="searchInput" placeholder="Search issues by file, linter, or message...">
            <button id="clearSearch" class="clear-btn" style="display: none;">
                <i class="material-symbols-outlined">close</i>
            </button>
        </div>
        <div class="filter-chips">
            <button class="filter-chip active" data-filter="all">All Issues</button>
            <button class="filter-chip" data-filter="severity-high">High Priority</button>
            <button class="filter-chip" data-filter="severity-medium">Medium Priority</button>
        </div>
    </div>

    <!-- Issues by Linter (Accordion) -->
    <div class="issues-section" id="issuesSection" style="display: none;">
        <div class="section-header">
            <h2 class="section-title">Issues by Linter</h2>
            <div class="report-actions">
                <button id="expandAllBtn" class="btn-secondary">
                    <i class="material-symbols-outlined">unfold_more</i>
                    Expand All
                </button>
                <button id="collapseAllBtn" class="btn-secondary">
                    <i class="material-symbols-outlined">unfold_less</i>
                    Collapse All
                </button>
                <button id="downloadTextBtn" class="btn-secondary">
                    <i class="material-symbols-outlined">download</i>
                    TXT
                </button>
                <button id="downloadJSONBtn" class="btn-secondary">
                    <i class="material-symbols-outlined">code</i>
                    JSON
                </button>
                <button id="downloadHTMLBtn" class="btn-secondary">
                    <i class="material-symbols-outlined">html</i>
                    HTML
                </button>
            </div>
        </div>
        <div id="accordionContainer" class="accordion-container"></div>
    </div>
</div>

<style>
    .linter-container {
        padding: 24px;
        max-width: 1400px;
        margin: 0 auto;
    }

    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 32px;
        padding: 0 24px;
    }

    .page-title {
        font-size: 32px;
        font-weight: 600;
        color: var(--md-sys-color-on-surface);
        margin: 0 0 8px 0;
    }

    .page-subtitle {
        font-size: 14px;
        color: var(--md-sys-color-on-surface-variant);
        margin: 0;
    }

    .btn-primary,
    .btn-secondary {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 24px;
        border: none;
        border-radius: 24px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }

    .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }

    .btn-secondary {
        background: var(--md-sys-color-surface-variant);
        color: var(--md-sys-color-on-surface-variant);
        font-size: 13px;
        padding: 8px 16px;
    }

    .btn-secondary:hover {
        background: var(--md-sys-color-surface);
    }

    .status-card {
        background: var(--md-sys-color-surface);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        gap: 20px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .status-icon {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }

    .status-icon.success {
        background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    }

    .status-icon.error {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    .status-icon i {
        font-size: 28px;
    }

    .status-icon.spinning i {
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        from {
            transform: rotate(0deg);
        }

        to {
            transform: rotate(360deg);
        }
    }

    .status-content h3 {
        margin: 0 0 4px 0;
        font-size: 18px;
        font-weight: 600;
        color: var(--md-sys-color-on-surface);
    }

    .status-content p {
        margin: 0;
        font-size: 14px;
        color: var(--md-sys-color-on-surface-variant);
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 32px;
    }

    .stat-card {
        background: var(--md-sys-color-surface);
        border-radius: 16px;
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .stat-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }

    .stat-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
    }

    .stat-icon i {
        font-size: 24px;
    }

    .stat-content {
        flex: 1;
    }

    .stat-value {
        font-size: 28px;
        font-weight: 700;
        color: var(--md-sys-color-on-surface);
        margin-bottom: 4px;
    }

    .stat-label {
        font-size: 13px;
        color: var(--md-sys-color-on-surface-variant);
        font-weight: 500;
    }

    .search-section {
        background: var(--md-sys-color-surface);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 24px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .search-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--md-sys-color-surface-variant);
        border-radius: 28px;
        padding: 12px 20px;
        margin-bottom: 16px;
    }

    .search-bar i {
        color: var(--md-sys-color-on-surface-variant);
        font-size: 24px;
    }

    .search-bar input {
        flex: 1;
        border: none;
        background: transparent;
        font-size: 14px;
        color: var(--md-sys-color-on-surface);
        outline: none;
    }

    .clear-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        display: flex;
        align-items: center;
        color: var(--md-sys-color-on-surface-variant);
    }

    .filter-chips {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
    }

    .filter-chip {
        padding: 8px 16px;
        border-radius: 16px;
        border: 1px solid var(--md-sys-color-outline);
        background: transparent;
        color: var(--md-sys-color-on-surface);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .filter-chip:hover {
        background: var(--md-sys-color-surface-variant);
    }

    .filter-chip.active {
        background: var(--md-sys-color-primary);
        color: var(--md-sys-color-on-primary);
        border-color: var(--md-sys-color-primary);
    }

    .issues-section {
        margin-bottom: 32px;
    }

    .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 12px;
    }

    .section-title {
        font-size: 20px;
        font-weight: 600;
        color: var(--md-sys-color-on-surface);
        margin: 0;
    }

    .report-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
    }

    .accordion-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .accordion-item {
        background: var(--md-sys-color-surface);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        transition: all 0.3s ease;
    }

    .accordion-item.hidden {
        display: none;
    }

    .accordion-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 20px;
        cursor: pointer;
        user-select: none;
        transition: background 0.2s ease;
    }

    .accordion-header:hover {
        background: var(--md-sys-color-surface-variant);
    }

    .accordion-title {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
    }

    .linter-name {
        font-size: 16px;
        font-weight: 600;
        color: var(--md-sys-color-on-surface);
    }

    .issue-count-badge {
        background: var(--md-sys-color-error-container);
        color: var(--md-sys-color-on-error-container);
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 600;
    }

    .accordion-icon {
        transition: transform 0.3s ease;
        color: var(--md-sys-color-on-surface-variant);
    }

    .accordion-item.active .accordion-icon {
        transform: rotate(180deg);
    }

    .accordion-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
    }

    .accordion-item.active .accordion-content {
        max-height: 2000px;
    }

    .accordion-body {
        padding: 0 20px 20px 20px;
    }

    .issue-card {
        background: var(--md-sys-color-surface-variant);
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 12px;
        border-left: 4px solid var(--md-sys-color-error);
    }

    .issue-card:last-child {
        margin-bottom: 0;
    }

    .issue-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        margin-bottom: 8px;
    }

    .issue-file {
        font-size: 13px;
        font-weight: 600;
        color: var(--md-sys-color-primary);
        font-family: 'Monaco', 'Menlo', monospace;
    }

    .issue-pos {
        font-size: 12px;
        color: var(--md-sys-color-on-surface-variant);
        font-family: 'Monaco', 'Menlo', monospace;
    }

    .issue-text {
        font-size: 14px;
        color: var(--md-sys-color-on-surface);
        margin-bottom: 8px;
        line-height: 1.5;
    }

    .issue-code {
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 12px;
        border-radius: 6px;
        font-family: 'Monaco', 'Menlo', monospace;
        font-size: 12px;
        overflow-x: auto;
        white-space: pre;
    }

    .no-results {
        text-align: center;
        padding: 40px;
        color: var(--md-sys-color-on-surface-variant);
    }

    .no-results i {
        font-size: 48px;
        margin-bottom: 16px;
        opacity: 0.5;
    }
</style>

<script>
    const runLinterBtn = document.getElementById('runLinterBtn');
    const statusCard = document.getElementById('statusCard');
    const statusIcon = document.getElementById('statusIcon');
    const statusTitle = document.getElementById('statusTitle');
    const statusMessage = document.getElementById('statusMessage');
    const statsGrid = document.getElementById('statsGrid');
    const searchSection = document.getElementById('searchSection');
    const issuesSection = document.getElementById('issuesSection');
    const searchInput = document.getElementById('searchInput');
    const clearSearch = document.getElementById('clearSearch');
    const accordionContainer = document.getElementById('accordionContainer');
    const expandAllBtn = document.getElementById('expandAllBtn');
    const collapseAllBtn = document.getElementById('collapseAllBtn');
    const downloadTextBtn = document.getElementById('downloadTextBtn');
    const downloadJSONBtn = document.getElementById('downloadJSONBtn');
    const downloadHTMLBtn = document.getElementById('downloadHTMLBtn');

    let reportPaths = {};
    let allIssues = [];
    let issuesByLinter = {};

    document.addEventListener('DOMContentLoaded', () => {
        // Re-select elements inside DOMContentLoaded to be safe
        const runLinterBtn = document.getElementById('runLinterBtn');
        const statusCard = document.getElementById('statusCard');
        const statusIcon = document.getElementById('statusIcon');
        const statusTitle = document.getElementById('statusTitle');
        const statusMessage = document.getElementById('statusMessage');
        const statsGrid = document.getElementById('statsGrid');
        const searchSection = document.getElementById('searchSection');
        const issuesSection = document.getElementById('issuesSection');

        if (runLinterBtn) {
            runLinterBtn.addEventListener('click', async () => {
                runLinterBtn.disabled = true;
                if (statusCard) statusCard.style.display = 'flex';
                if (statsGrid) statsGrid.style.display = 'none';
                if (searchSection) searchSection.style.display = 'none';
                if (issuesSection) issuesSection.style.display = 'none';

                if (statusIcon) {
                    statusIcon.className = 'status-icon spinning';
                    statusIcon.innerHTML = '<i class="material-symbols-outlined">pending</i>';
                }
                if (statusTitle) statusTitle.textContent = 'Running Linter...';
                if (statusMessage) statusMessage.textContent = 'Please wait while we analyze your code (this may take a few minutes)';

                try {
                    const response = await fetch('/admin/linter/run', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        }
                    });

                    const contentType = response.headers.get("content-type");
                    if (!contentType || !contentType.includes("application/json")) {
                        throw new Error("Invalid response from server");
                    }

                    const issues = await response.json();

                    if (issues.error) {
                        showError(issues.error);
                    } else {
                        // GolangCI-Lint JSON output handler
                        const newIssues = Array.isArray(issues) ? issues : (issues.Issues || []);

                        // Update global allIssues
                        // Note: processIssues expects the array
                        allIssues = newIssues;
                        processIssues(allIssues);
                        showSuccess();
                    }
                } catch (error) {
                    showError('Network error: ' + error.message);
                } finally {
                    runLinterBtn.disabled = false;
                }
            });
        }
    });

    function processIssues(issues) {
        issuesByLinter = {};

        issues.forEach(issue => {
            const linter = issue.FromLinter || 'unknown';
            if (!issuesByLinter[linter]) {
                issuesByLinter[linter] = [];
            }
            issuesByLinter[linter].push(issue);
        });

        // Sort linters by issue count
        const sortedLinters = Object.entries(issuesByLinter)
            .sort((a, b) => b[1].length - a[1].length);

        renderAccordion(sortedLinters);
    }

    function renderAccordion(sortedLinters) {
        accordionContainer.innerHTML = '';

        sortedLinters.forEach(([linter, issues]) => {
            const item = document.createElement('div');
            item.className = 'accordion-item';
            item.dataset.linter = linter;

            const header = document.createElement('div');
            header.className = 'accordion-header';
            header.innerHTML = `
                <div class="accordion-title">
                    <span class="linter-name">${linter}</span>
                    <span class="issue-count-badge">${issues.length} issue${issues.length > 1 ? 's' : ''}</span>
                </div>
                <i class="material-symbols-outlined accordion-icon">expand_more</i>
            `;

            const content = document.createElement('div');
            content.className = 'accordion-content';

            const body = document.createElement('div');
            body.className = 'accordion-body';

            issues.forEach(issue => {
                const issueCard = createIssueCard(issue);
                body.appendChild(issueCard);
            });

            content.appendChild(body);
            item.appendChild(header);
            item.appendChild(content);
            accordionContainer.appendChild(item);

            header.addEventListener('click', () => {
                item.classList.toggle('active');
            });
        });
    }

    function createIssueCard(issue) {
        const card = document.createElement('div');
        card.className = 'issue-card';
        card.dataset.issueText = JSON.stringify(issue).toLowerCase();

        const pos = issue.Pos || {};
        const filename = pos.Filename || 'unknown';
        const line = pos.Line || 0;
        const column = pos.Column || 0;

        card.innerHTML = `
            <div class="issue-header">
                <div>
                    <div class="issue-file">${filename}</div>
                    <div class="issue-pos">Line ${line}, Column ${column}</div>
                </div>
            </div>
            <div class="issue-text">${escapeHtml(issue.Text || 'No description')}</div>
            ${issue.SourceLines && issue.SourceLines.length > 0 ?
                `<div class="issue-code">${escapeHtml(issue.SourceLines.join('\n'))}</div>` :
                ''}
        `;

        return card;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function showSuccess() {
        statusIcon.className = 'status-icon success';
        statusIcon.innerHTML = '<i class="material-symbols-outlined">check_circle</i>';
        statusTitle.textContent = 'Linter Completed Successfully';
        statusMessage.textContent = `Found ${allIssues.length} issues across ${Object.keys(issuesByLinter).length} linters`;

        // Update stats
        document.getElementById('totalIssues').textContent = allIssues.length;
        document.getElementById('totalLinters').textContent = Object.keys(issuesByLinter).length;

        const uniqueFiles = new Set(allIssues.map(i => i.Pos?.Filename).filter(Boolean));
        document.getElementById('totalFiles').textContent = uniqueFiles.size;
        document.getElementById('lastRun').textContent = new Date().toLocaleTimeString();

        statsGrid.style.display = 'grid';
        searchSection.style.display = 'block';
        issuesSection.style.display = 'block';
    }

    function showError(message) {
        statusIcon.className = 'status-icon error';
        statusIcon.innerHTML = '<i class="material-symbols-outlined">error</i>';
        statusTitle.textContent = 'Linter Failed';
        statusMessage.textContent = message;
    }

    // Search functionality
    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        clearSearch.style.display = query ? 'block' : 'none';
        filterIssues(query);
    });

    clearSearch.addEventListener('click', () => {
        searchInput.value = '';
        clearSearch.style.display = 'none';
        filterIssues('');
    });

    function filterIssues(query) {
        const items = accordionContainer.querySelectorAll('.accordion-item');
        let visibleCount = 0;

        items.forEach(item => {
            const cards = item.querySelectorAll('.issue-card');
            let visibleCards = 0;

            cards.forEach(card => {
                const text = card.dataset.issueText;
                if (!query || text.includes(query)) {
                    card.style.display = 'block';
                    visibleCards++;
                } else {
                    card.style.display = 'none';
                }
            });

            if (visibleCards > 0) {
                item.classList.remove('hidden');
                visibleCount++;
                // Update badge count
                const badge = item.querySelector('.issue-count-badge');
                badge.textContent = `${visibleCards} issue${visibleCards > 1 ? 's' : ''}`;
            } else {
                item.classList.add('hidden');
            }
        });

        if (visibleCount === 0 && query) {
            showNoResults();
        } else {
            hideNoResults();
        }
    }

    function showNoResults() {
        let noResults = accordionContainer.querySelector('.no-results');
        if (!noResults) {
            noResults = document.createElement('div');
            noResults.className = 'no-results';
            noResults.innerHTML = `
                <i class="material-symbols-outlined">search_off</i>
                <div>No issues found matching your search</div>
            `;
            accordionContainer.appendChild(noResults);
        }
    }

    function hideNoResults() {
        const noResults = accordionContainer.querySelector('.no-results');
        if (noResults) {
            noResults.remove();
        }
    }

    // Expand/Collapse all
    expandAllBtn.addEventListener('click', () => {
        accordionContainer.querySelectorAll('.accordion-item:not(.hidden)').forEach(item => {
            item.classList.add('active');
        });
    });

    collapseAllBtn.addEventListener('click', () => {
        accordionContainer.querySelectorAll('.accordion-item').forEach(item => {
            item.classList.remove('active');
        });
    });

    // Download buttons
    downloadTextBtn.addEventListener('click', () => {
        window.open('/docs/report/linter/report.txt', '_blank');
    });

    downloadJSONBtn.addEventListener('click', () => {
        window.open('/docs/report/linter/report.json', '_blank');
    });

    downloadHTMLBtn.addEventListener('click', () => {
        window.open('/docs/report/linter/report.html', '_blank');
    });




</script>
{{ end }}
