{{ define "content" }}
<div class="page-content-wrapper">
    <div class="content-header flex-between" style="margin-bottom: 32px;">
        <div>
            <h2 style="margin-bottom: 8px;">Access Control</h2>
            <p class="text-muted">Manage roles, permissions, scopes, and policies</p>
        </div>
    </div>

    <!-- Quick Actions -->
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px;">
        <a href="/admin/rbac/roles" class="btn btn-secondary"
            style="justify-content: center; height: 60px; flex-direction: column; gap: 4px;">
            <i class="material-symbols-outlined">badge</i>
            <span>Roles</span>
        </a>
        <a href="/admin/rbac/permissions" class="btn btn-secondary"
            style="justify-content: center; height: 60px; flex-direction: column; gap: 4px;">
            <i class="material-symbols-outlined">key</i>
            <span>Permissions</span>
        </a>
        <a href="/admin/rbac/scopes" class="btn btn-secondary"
            style="justify-content: center; height: 60px; flex-direction: column; gap: 4px;">
            <i class="material-symbols-outlined">category</i>
            <span>Scopes</span>
        </a>
        <a href="/admin/abac/policies" class="btn btn-secondary"
            style="justify-content: center; height: 60px; flex-direction: column; gap: 4px;">
            <i class="material-symbols-outlined">policy</i>
            <span>Policies</span>
        </a>
    </div>

    <!-- Stats -->
    <div class="neon-stats-grid">
        <div class="neon-card">
            <div class="stat-value-big">{{ .RolesCount }}</div>
            <div class="text-muted">Defined Roles</div>
        </div>
        <div class="neon-card">
            <div class="stat-value-big">{{ .PermsCount }}</div>
            <div class="text-muted">Permissions</div>
        </div>
        <div class="neon-card">
            <div class="stat-value-big">{{ .ScopesCount }}</div>
            <div class="text-muted">Scopes</div>
        </div>
        <div class="neon-card">
            <div class="stat-value-big">{{ .PoliciesCount }}</div>
            <div class="text-muted">ABAC Policies</div>
        </div>
    </div>
</div>
{{ end }}
