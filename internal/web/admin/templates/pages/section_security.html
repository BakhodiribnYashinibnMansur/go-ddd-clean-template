{{ define "content" }}
<div class="page-content-wrapper">
    <div style="margin-bottom: 32px;">
        <h2 style="font-size: 26px; font-weight: 700; margin-bottom: 4px;">Security</h2>
        <p style="font-size: 13px; color: var(--text-muted);">Rate limiting, IP management, and security controls</p>
    </div>
    <div class="stat-hero-grid" style="grid-template-columns: repeat(3, 1fr); margin-bottom: 28px;">
        <a href="/admin/rate-limits" class="stat-hero" style="text-decoration: none; color: inherit;">
            <div class="stat-hero-icon" style="background: rgba(245, 158, 11, 0.1); color: var(--amber);">
                <i class="material-symbols-outlined">speed</i>
            </div>
            <div class="stat-hero-value">{{ .RateLimitRules }}</div>
            <div class="stat-hero-label">Rate Limit Rules</div>
        </a>
        <a href="/admin/ip-rules" class="stat-hero" style="text-decoration: none; color: inherit;">
            <div class="stat-hero-icon" style="background: rgba(239, 68, 68, 0.1); color: var(--rose);">
                <i class="material-symbols-outlined">shield</i>
            </div>
            <div class="stat-hero-value">{{ .IPRulesCount }}</div>
            <div class="stat-hero-label">IP Rules</div>
        </a>
        <a href="/admin/ip-rules" class="stat-hero" style="text-decoration: none; color: inherit;">
            <div class="stat-hero-icon" style="background: rgba(239, 68, 68, 0.1); color: var(--rose);">
                <i class="material-symbols-outlined">block</i>
            </div>
            <div class="stat-hero-value">{{ .BlockedIPs }}</div>
            <div class="stat-hero-label">Blocked IPs</div>
        </a>
    </div>
</div>
{{ end }}
{{ define "scripts" }}{{ end }}
