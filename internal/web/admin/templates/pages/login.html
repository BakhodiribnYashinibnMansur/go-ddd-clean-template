<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Admin Panel</title>
    <!-- Core CSS -->
    <link rel="stylesheet" href="/static/css/material.css">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary-color);">Admin Login</h2>

            {{ if .Error }}
            <div
                style="background: #fee2e2; color: #991b1b; padding: 1rem; border-radius: var(--radius-md); margin-bottom: 1rem;">
                {{ .Error }}
            </div>
            {{ end }}

            <form action="/admin/login" method="POST">
                <!-- CSRF Token Placeholder -->
                <input type="hidden" name="_csrf" value="{{ .CSRF }}">

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-input" required placeholder="admin@example.com">
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Sign In
                </button>
            </form>
        </div>
    </div>
</body>

</html>
