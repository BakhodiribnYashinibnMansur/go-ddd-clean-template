{{ define "content" }}
<div class="page-content-wrapper">
    <div class="content-header flex-between" style="margin-bottom: 32px;">
        <div>
            <h2 style="margin-bottom: 8px;">Tools & Settings</h2>
            <p class="text-muted">Configuration and utilities</p>
        </div>
    </div>

    <div style="display: flex; gap: 16px; margin-bottom: 32px;">
        <a href="/admin/linter" class="btn btn-secondary" style="flex: 1; justify-content: center; height: 50px;">
            <i class="material-symbols-outlined" style="margin-right: 8px;">check_circle</i>
            Linter
        </a>
        <a href="/admin/settings" class="btn btn-primary" style="flex: 1; justify-content: center; height: 50px;">
            <i class="material-symbols-outlined" style="margin-right: 8px;">settings</i>
            Settings
        </a>
        {{ if .AsynqEnabled }}
        <a href="/admin/asynq" class="btn btn-secondary" style="flex: 1; justify-content: center; height: 50px;">
            <i class="material-symbols-outlined" style="margin-right: 8px;">schedule</i>
            Task Queue
        </a>
        {{ end }}
    </div>

    <!-- Status -->
    <div class="neon-stats-grid">
        <div class="neon-card">
            <div class="flex-between">
                <span>Linter Status</span>
                <span style="color: var(--success);">{{ .LinterStatus }}</span>
            </div>
        </div>
    </div>
</div>
{{ end }}
