{{ template "base" . }}

{{ define "content" }}
<div class="coming-soon-container">
    <div class="coming-soon-card">
        <div class="icon-wrapper">
            <i class="material-symbols-outlined">rocket_launch</i>
        </div>
        <h2 class="title">Feature In Orbit</h2>
        <p class="description">
            We're currently crafting this feature to perfection. <br>
            It will be landing in your workspace very soon.
        </p>

        <div class="progress-bar-container">
            <div class="progress-bar"></div>
        </div>
        <p class="status-text">Development in progress...</p>

        <a href="/admin/dashboard" class="btn btn-primary return-btn">
            <i class="material-symbols-outlined">dashboard</i>
            Return to Dashboard
        </a>
    </div>
</div>

<style>
    .coming-soon-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        padding: 24px;
    }

    .coming-soon-card {
        background: rgba(30, 41, 59, 0.4);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 48px;
        text-align: center;
        max-width: 480px;
        width: 100%;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
        0% {
            transform: translateY(0px);
        }

        50% {
            transform: translateY(-10px);
        }

        100% {
            transform: translateY(0px);
        }
    }

    .icon-wrapper {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        box-shadow: 0 0 30px var(--primary-glow);
    }

    .icon-wrapper i {
        font-size: 40px;
        color: white;
    }

    .title {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 12px;
        background: linear-gradient(135deg, #fff, #94a3b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .description {
        color: var(--text-secondary);
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 32px;
    }

    .progress-bar-container {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 99px;
        overflow: hidden;
        margin-bottom: 12px;
    }

    .progress-bar {
        width: 60%;
        height: 100%;
        background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
        border-radius: 99px;
        animation: shimmer 2s linear infinite;
        position: relative;
    }

    @keyframes shimmer {
        0% {
            background-position: -200% 0;
        }

        100% {
            background-position: 200% 0;
        }
    }

    .status-text {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 32px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .return-btn {
        padding: 12px 24px;
        font-size: 15px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
    }

    .return-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: translateY(-2px);
    }
</style>
{{ end }}
