{{ template "base" . }}

{{ define "content" }}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="flex-between" style="margin-bottom: var(--spacing-md);">
        <div>
            <h2 class="text-h2">Create New User</h2>
            <p class="text-body">Add a new user to the system. They will be automatically active.</p>
        </div>
        <a href="/admin/users" class="btn btn-text">
            <i class="material-symbols-outlined">arrow_back</i>
            Back to Users
        </a>
    </div>

    <div class="card" style="padding: 24px;">
        {{ if .Error }}
        <div
            style="background-color: #fee2e2; color: #dc2626; padding: 12px; border-radius: 8px; margin-bottom: 24px; display: flex; align-items: center; gap: 8px;">
            <i class="material-symbols-outlined">error</i>
            {{ .Error }}
        </div>
        {{ end }}

        <form action="/admin/users/create" method="POST">
            <input type="hidden" name="_csrf" value="{{ .CSRF }}">

            <div style="margin-bottom: 16px;">
                <label class="form-label">Email Address</label>
                <div style="position: relative;">
                    <i class="material-symbols-outlined"
                        style="position: absolute; left: 12px; top: 10px; color: var(--md-sys-color-outline);">mail</i>
                    <input type="email" name="email" class="form-input" style="padding-left: 40px;"
                        placeholder="name@company.com" required>
                </div>
            </div>

            <div style="margin-bottom: 16px;">
                <label class="form-label">Phone Number</label>
                <div style="position: relative;">
                    <i class="material-symbols-outlined"
                        style="position: absolute; left: 12px; top: 10px; color: var(--md-sys-color-outline);">call</i>
                    <input type="tel" name="phone" class="form-input" style="padding-left: 40px;"
                        placeholder="+998901234567" required>
                </div>
            </div>

            <div style="margin-bottom: 16px;">
                <label class="form-label">Password</label>
                <div style="position: relative;">
                    <i class="material-symbols-outlined"
                        style="position: absolute; left: 12px; top: 10px; color: var(--md-sys-color-outline);">lock</i>
                    <input type="password" name="password" class="form-input" style="padding-left: 40px;"
                        placeholder="••••••••" required>
                </div>
            </div>

            <div style="margin-bottom: 24px;">
                <label class="form-label">Confirm Password</label>
                <div style="position: relative;">
                    <i class="material-symbols-outlined"
                        style="position: absolute; left: 12px; top: 10px; color: var(--md-sys-color-outline);">lock_reset</i>
                    <input type="password" name="confirm_password" class="form-input" style="padding-left: 40px;"
                        placeholder="••••••••" required>
                </div>
            </div>

            <div class="flex-end">
                <button type="submit" class="btn btn-primary">
                    <i class="material-symbols-outlined">save</i>
                    Create User
                </button>
            </div>
        </form>
    </div>
</div>
{{ end }}
