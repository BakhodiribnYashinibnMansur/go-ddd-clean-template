{{ template "base" . }}

{{ define "content" }}
<div style="margin-bottom: 24px;">
    <a href="/admin/users/{{ .User.ID }}" class="btn btn-secondary" style="margin-bottom: 16px; text-decoration: none;">
        <i class="material-symbols-outlined" style="font-size: 18px;">arrow_back</i> Back to Details
    </a>
    <h2>Edit User</h2>
</div>

<div class="card" style="max-width: 600px;">
    {{ if .Error }}
    <div class="alert alert-error" style="margin-bottom: 24px;">
        <i class="material-symbols-outlined">error</i> {{ .Error }}
    </div>
    {{ end }}

    <form method="POST" action="/admin/users/{{ .User.ID }}/edit">
        <input type="hidden" name="_csrf" value="{{ .CSRF }}">

        <div class="form-group" style="margin-bottom: 16px;">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" value="{{ if .User.Email }}{{ .User.Email }}{{ end }}"
                required>
        </div>

        <div class="form-group" style="margin-bottom: 16px;">
            <label class="form-label">Phone</label>
            <input type="tel" name="phone" class="form-control" value="{{ if .User.Phone }}{{ .User.Phone }}{{ end }}"
                required>
        </div>

        <div class="form-group" style="margin-bottom: 24px;">
            <label class="form-label">Username (Optional)</label>
            <input type="text" name="username" class="form-control"
                value="{{ if .User.Username }}{{ .User.Username }}{{ end }}">
        </div>

        <div style="display: flex; gap: 12px; justify-content: flex-end;">
            <a href="/admin/users/{{ .User.ID }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
    </form>
</div>
{{ end }}
