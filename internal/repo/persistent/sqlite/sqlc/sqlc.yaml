version: "2"
sql:
  - engine: "sqlite"
    queries: "query.sql"
    schema: "../../../../../migrations/sqlite/"
    gen:
      go:
        package: "sqlc"
        out: "."
        emit_json_tags: true
        emit_db_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_empty_slices: true
