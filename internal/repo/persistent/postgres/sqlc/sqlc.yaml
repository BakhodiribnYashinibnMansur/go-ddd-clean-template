version: "2"
sql:
  - engine: "postgresql"
    queries: "query.sql"
    schema: "../../../../../migrations/postgres/"
    gen:
      go:
        package: "sqlc"
        out: "."
        emit_json_tags: true
        emit_db_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
