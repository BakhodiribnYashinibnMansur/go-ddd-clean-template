syntax = "proto3";
package events.user.v1;
option go_package = "gct/proto/gen/go/events/user/v1";

message UserCreatedEvent {
  string user_id = 1;
  string phone = 2;
  string email = 3;
  string role_id = 4;
  int64 occurred_at_unix = 5;
}

message UserSignedInEvent {
  string user_id = 1;
  string session_id = 2;
  string device_type = 3;
  string ip_address = 4;
  int64 occurred_at_unix = 5;
}

message UserDeactivatedEvent {
  string user_id = 1;
  string reason = 2;
  int64 occurred_at_unix = 3;
}

message PasswordChangedEvent {
  string user_id = 1;
  int64 occurred_at_unix = 2;
}

message UserApprovedEvent {
  string user_id = 1;
  int64 occurred_at_unix = 2;
}

message RoleChangedEvent {
  string user_id = 1;
  string old_role_id = 2;
  string new_role_id = 3;
  int64 occurred_at_unix = 4;
}
