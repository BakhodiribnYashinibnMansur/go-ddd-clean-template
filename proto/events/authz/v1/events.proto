syntax = "proto3";
package events.authz.v1;
option go_package = "gct/proto/gen/go/events/authz/v1";

message RoleCreatedEvent {
  string role_id = 1;
  string name = 2;
  int64 occurred_at_unix = 3;
}

message RoleDeletedEvent {
  string role_id = 1;
  int64 occurred_at_unix = 2;
}

message PolicyUpdatedEvent {
  string policy_id = 1;
  string permission_id = 2;
  string effect = 3;
  int64 occurred_at_unix = 4;
}
